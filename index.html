<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Energy Dashboard MQTT</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body {
    background: #000;
    color: #e5e7eb;
    font-family: sans-serif;
    margin: 0;
    overflow: hidden;
}

svg {
    width: 100vw;
    height: 100vh;
}


/* Nodes */
.node {
    fill: #020617;
    stroke: #334155;
    stroke-width: 2;
}

.label {
    fill: #e5e7eb;
    font-size: 16px;
    text-anchor: middle;
}

.power {
    fill: #94a3b8;
    font-size: 12px;
    text-anchor: middle;
}


/* Lijnen */
.line {
    fill: none;
    stroke-width: 2;
    opacity: 0.5;
}


.line.net {
    stroke: #38bdf8;
}

.line.bat {
    stroke: #22c55e;
}

.line.solar {
    stroke: #facc15;
}

.line.house {
    stroke: #f87171;
}

.line.ev {
    stroke: #a78bfa;
}


/* Bewegende bolletjes */

.flow {
    opacity: 0.9;
}


.flow.net {
    fill: #7dd3fc;
}

.flow.battery {
    fill: #4ade80;
}

.flow.solar {
    fill: #fef08a;
}

.flow.house {
    fill: #fca5a5;
}

.flow.ev {
    fill: #c4b5fd;
}


/* Node kleuren */

.net-node {
    stroke: #38bdf8;
}

.bat-node {
    stroke: #22c55e;
}

.solar-node {
    stroke: #facc15;
}

.house-node {
    stroke: #f87171;
}

.ev-node {
    stroke: #a78bfa;
}

</style>

</head>


<body>


<svg viewBox="0 0 700 400">


<!-- Nodes -->

<rect class="node"
      x="300"
      y="150"
      width="100"
      height="50"
      rx="16"/>

<text class="label"
      x="350"
      y="180">
      🔹
</text>



<!-- Net -->

<circle class="node net-node"
        cx="550"
        cy="65"
        r="35"/>

<text class="label"
      x="550"
      y="60"
      transform="scale(1.5)"
      transform-origin="550 60">
      ⚡
</text>

<text class="power"
      id="net_power"
      x="550"
      y="75">
      0 W
</text>




<!-- Batterij -->

<circle class="node bat-node"
        cx="535"
        cy="325"
        r="35"/>

<text class="label"
      x="535"
      y="320"
      transform="scale(1.5)"
      transform-origin="535 320">
      🔋
</text>

<text class="power"
      id="battery_power"
      x="535"
      y="335">
      0 W
</text>

<text class="power"
      id="battery_charge"
      x="535"
      y="350">
      0 %
</text>




<!-- Solar -->

<circle class="node solar-node"
        cx="100"
        cy="70"
        r="35"/>

<text class="label"
      x="100"
      y="65"
      transform="scale(1.5)"
      transform-origin="100 65">
      ☀️
</text>

<text class="power"
      id="solar_power"
      x="100"
      y="80">
      0 W
</text>

<text class="power"
      id="solar_poweropwek"
      x="100"
      y="95">
      0 kWh
</text>




<!-- Huis -->

<circle class="node house-node"
        cx="115"
        cy="270"
        r="35"/>

<text class="label"
      x="115"
      y="265"
      transform="scale(1.5)"
      transform-origin="115 265">
      🏠
</text>

<text class="power"
      id="house_power"
      x="115"
      y="280">
      0 W
</text>




<!-- EV -->

<circle class="node ev-node"
        cx="350"
        cy="335"
        r="35"/>

<text class="label"
      x="350"
      y="330"
      transform="scale(1.5)"
      transform-origin="350 330">
      🚗
</text>

<text class="power"
      id="ev_power"
      x="350"
      y="345">
      0 W
</text>

<text class="power"
      id="ev_charge"
      x="350"
      y="360">
      0 kWh
</text>



<!-- Verbindingen -->

<path id="net_to_hub"
      class="line net"
      d="M550,100 Q550,175 400,175"/>


<path id="battery_to_hub"
      class="line bat"
      d="M500 325 C375 325 375 200 375 200"/>


<path id="solar_to_hub"
      class="line solar"
      d="M100 105 C100 175 145 175 300 175"/>


<path id="hub_to_house"
      class="line house"
      d="M325 200 Q325,270,150,270"/>


<path id="hub_to_ev"
      class="line ev"
      d="M350 200 L350 300"/>




<!-- Flow bolletjes -->

<circle id="flow_net"
        class="flow net"
        r="6"/>


<circle id="flow_battery"
        class="flow battery"
        r="6"/>


<circle id="flow_solar"
        class="flow solar"
        r="6"/>


<circle id="flow_house"
        class="flow house"
        r="6"/>


<circle id="flow_ev"
        class="flow ev"
        r="6"/>


</svg>
<script>

// ================= DATA =================

const energy = {
    net: 0,
    battery: 0,
    solar: 0,
    house: 0,
    ev: 0
};


// ================= DOM CACHE =================

const el = {

    net: document.getElementById("net_power"),

    battery: document.getElementById("battery_power"),

    solar: document.getElementById("solar_power"),

    solarKwh: document.getElementById("solar_poweropwek"),

    house: document.getElementById("house_power"),

    ev: document.getElementById("ev_power"),

    evcharge: document.getElementById("ev_charge"),

    battCharge: document.getElementById("battery_charge")

};



// ================= MQTT =================


const client = mqtt.connect(
    "wss://broker.emqx.io:8084/mqtt",
    {
        reconnectPeriod: 2000,
        clean: true,
        keepalive: 30
    }
);



client.on("connect", () => {

    console.log("MQTT connected");

    client.subscribe("huis/#");

});



client.on("error", (e)=>{

    console.error(
        "MQTT error:",
        e
    );

});



client.on("reconnect", ()=>{

    console.log(
        "MQTT reconnecting..."
    );

});




// ================= MQTT DATA =================


client.on("message",(topic,message)=>{


    const value =
        Number(
            message.toString()
        );


    if(Number.isNaN(value))
        return;



    switch(topic){


        case "huis/sensor/p1_meter_power/state":

            energy.net = value;

            el.net.textContent =
                Math.abs(
                    Math.round(value)
                )
                +" W";

            break;



        case "huis/Venus1/power":

            energy.battery=value;

            el.battery.textContent =
                Math.abs(
                    Math.round(value)
                )
                +" W";

            break;



        case "huis/sensor/solaredge_ac_power/state":

            energy.solar=value;

            el.solar.textContent =
                Math.round(value)
                +" W";

            break;



        case "huis/sensor/solaredge_opbrengst_vandaag/state":

            el.solarKwh.textContent =
                value.toFixed(0)
                +" kWh";

            break;



        case "huis/sensor/tesla_wall_connector_total_power/state":

            energy.ev =
                value * 1000;

            el.ev.textContent =
                Math.round(value*1000)
                +" W";

            break;



        case "huis/Venus1/soc":

            el.battCharge.textContent =
                value
                +" %";

            break;



        case "huis/sensor/tesla_wall_connector_session_energy/state":

            el.evcharge.textContent =
                value.toFixed(0)
                +" kWh";

            break;

    }


    updateHousePower();


});





// ================= BEREKENING HUISVERBRUIK =================


function updateHousePower(){


    energy.house =
        energy.net
        +
        energy.solar
        +
        energy.battery
        -
        energy.ev;



    el.house.textContent =
        Math.abs(
            Math.round(
                energy.house
            )
        )
        +" W";

}




// ================= FLOW OBJECTEN =================


const flows = {


    net: {

        path:"net_to_hub",
        el:"flow_net",
        pos:0

    },


    battery: {

        path:"battery_to_hub",
        el:"flow_battery",
        pos:0

    },


    solar: {

        path:"solar_to_hub",
        el:"flow_solar",
        pos:0

    },


    house: {

        path:"hub_to_house",
        el:"flow_house",
        pos:0

    },


    ev: {

        path:"hub_to_ev",
        el:"flow_ev",
        pos:0

    }


};





// ================= SAFARI PROOF FLOW =================


function animateFlow(
    key,
    power
){


    const f =
        flows[key];


    const circle =
        document.getElementById(
            f.el
        );


    const path =
        document.getElementById(
            f.path
        );



    if(!circle || !path)
        return;



    const length =
        path.getTotalLength();



    if(!length || !isFinite(length))
        return;



    if(
        !power ||
        Math.abs(power)<1
    ){

        circle.style.display="none";

        return;

    }



    circle.style.display="block";



    const direction =
        power >= 0
        ? 1
        : -1;



    const speed =
        Math.min(
            Math.sqrt(
                Math.abs(power)/1000
            )
            *
            0.005,
            0.05
        );



    f.pos +=
        speed *
        direction;



    if(f.pos>1)
        f.pos=0;


    if(f.pos<0)
        f.pos=1;




    const point =
        path.getPointAtLength(
            f.pos * length
        );



    circle.setAttribute(
        "cx",
        point.x
    );


    circle.setAttribute(
        "cy",
        point.y
    );


}





// ================= ANIMATION LOOP =================


function animate(){


    animateFlow(
        "net",
        energy.net
    );


    animateFlow(
        "battery",
        energy.battery
    );


    animateFlow(
        "solar",
        energy.solar
    );


    animateFlow(
        "house",
        energy.house
    );


    animateFlow(
        "ev",
        energy.ev
    );



    requestAnimationFrame(
        animate
    );


}




// Safari wacht tot SVG volledig bestaat

window.addEventListener(
    "load",
    ()=>{

        setTimeout(
            ()=>{
                animate();
            },
            100
        );

    }
);


</script>


</body>
</html>
