<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Energy Dashboard MQTT</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body { background: #000; color: #e5e7eb; font-family: sans-serif; margin: 0; }
svg { width: 100vw; height: 100vh; }

.node { fill: #020617; stroke: #334155; stroke-width: 2; rx: 16; }
.label { fill: #e5e7eb; font-size: 16px; text-anchor: middle; }
.power { fill: #94a3b8; font-size: 12px; text-anchor: middle; }

.line { fill: none; stroke-width: 2; opacity: 0.5; }
.flow { r: 6; opacity: 0.9; }

.line.net { stroke: #38bdf8; }
.line.bat { stroke: #22c55e; }
.line.solar { stroke: #facc15; }
.line.house { stroke: #f87171; }
.line.ev { stroke: #a78bfa; }

.flow.net { fill: #7dd3fc; }
.flow.bat { fill: #4ade80; }
.flow.solar { fill: #fef08a; }
.flow.house { fill: #fca5a5; }
.flow.ev { fill: #c4b5fd; }

.net-node { stroke: #38bdf8; }
.bat-node { stroke: #22c55e; }
.solar-node { stroke: #facc15; }
.house-node { stroke: #f87171; }
.ev-node { stroke: #a78bfa; }
</style>
</head>

<body>

<svg viewBox="0 0 700 400">
<defs>
  <filter id="glow">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<!-- Nodes -->
  <rect class="node" x="300" y="150" width="100" height="50"/>
  <text class="label" x="350" y="180">🔹 </text> 
  
<circle class="node net-node" cx="550" cy="65" r="35"/>
<text class="label" x="550" y="60">⚡</text>
<text class="power" id="net_power" x="550" y="75">0 W</text>

<circle class="node bat-node" cx="535" cy="325" r="35"/>
<text class="label" x="535" y="320">🔋</text>
<text class="power" id="battery_power" x="535" y="335">0 W</text>
<text class="power" id="battery_charge" x="535" y="350">0 %</text>

<circle class="node solar-node" cx="100" cy="70" r="35"/>
<text class="label" x="100" y="65">☀️</text>
<text class="power" id="solar_power" x="100" y="80">0 W</text>
<text class="power" id="solar_poweropwek" x="100" y="95">0 kWh</text>

<circle class="node house-node" cx="115" cy="270" r="35"/>
<text class="label" x="115" y="265">🏠</text>
<text class="power" id="house_power" x="115" y="280">0 W</text>

<circle class="node ev-node" cx="350" cy="335" r="35"/>
<text class="label" x="350" y="330">🚗</text>
<text class="power" id="ev_power" x="350" y="345">0 W</text>
<!--<text class="power" id="ev_charge" x="350" y="360">0 %</text>-->

<!-- Lines -->
<path id="net_to_hub" class="line net" d="M550,100 Q550,175 400,175"/>
<path id="battery_to_hub" class="line bat" d="M500 325 C375 325 375 200 375 200"/>
<path id="solar_to_hub" class="line solar" d="M100 105 C100 175 145 175 300 175"/>
<path id="hub_to_house" class="line house" d="M325 200 Q325,270,150,270"/>
<path id="hub_to_ev" class="line ev" d="M350 200 L350 300"/>

<!-- Flow dots -->
<circle id="flow_net" class="flow net" filter="url(#glow)"/>
<circle id="flow_battery" class="flow bat" filter="url(#glow)"/>
<circle id="flow_solar" class="flow solar" filter="url(#glow)"/>
<circle id="flow_house" class="flow house" filter="url(#glow)"/>
<circle id="flow_ev" class="flow ev" filter="url(#glow)"/>

</svg>

<script>
// ================= DATA =================
const energy = {
    net: 0,
    battery: 0,
    solar: 0,
    house: 0,
    ev: 0
};

// cache DOM (sneller)
const el = {
    net: document.getElementById("net_power"),
    battery: document.getElementById("battery_power"),
    solar: document.getElementById("solar_power"),
    solarKwh: document.getElementById("solar_poweropwek"),
    house: document.getElementById("house_power"),
    ev: document.getElementById("ev_power"),
    battCharge: document.getElementById("battery_charge"),
    evCharge: document.getElementById("ev_charge")
};

// ================= MQTT =================
const client = mqtt.connect("wss://test.mosquitto.org:8081/mqtt", {
    reconnectPeriod: 2000
});

client.on("connect", () => {
    console.log("MQTT connected");
    client.subscribe("huis/#");
});

client.on("error", (e) => {
    console.error("MQTT error:", e);
});

client.on("reconnect", () => {
    console.log("MQTT reconnecting...");
});

// ================= MESSAGE HANDLER =================
client.on("message", (topic, message) => {

    const value = Number(message.toString());
    if (Number.isNaN(value)) return;

    switch (topic) {

        case "huis/net":
            energy.net = value;
            el.net.textContent = Math.abs(value) + " W";
            break;

        case "huis/battery":
            energy.battery = value;
            el.battery.textContent = Math.abs(value) + " W";
            break;

        case "huis/solar":
            energy.solar = value;
            el.solar.textContent = Math.round(value) + " W";
            break;

        case "huis/solar/opwek":
            el.solarKwh.textContent = (value / 1).toFixed(0) + " kWh";
            break;

        case "huis/house":
            energy.house = value;
            el.house.textContent = Math.abs(value) + " W";
            break;

        case "huis/ev":
            energy.ev = value;
            el.ev.textContent = Math.round(value) + " W";
            break;

        case "huis/battery/charge":
            el.battCharge.textContent = value + " %";
            break;

        case "huis/ev/charge":
            el.evCharge.textContent = value + " %";
            break;
    }
});

// ================= FLOW ANIMATION =================
const flows = {
    net: { path: "net_to_hub", el: "flow_net", pos: 0 },
    battery: { path: "battery_to_hub", el: "flow_battery", pos: 0 },
    solar: { path: "solar_to_hub", el: "flow_solar", pos: 0 },
    house: { path: "hub_to_house", el: "flow_house", pos: 0 },
    ev: { path: "hub_to_ev", el: "flow_ev", pos: 0 }
};

function animateFlow(key, power) {
    const f = flows[key];
    const circle = document.getElementById(f.el);
    const path = document.getElementById(f.path);

    if (!power || Math.abs(power) < 1) {
        circle.style.display = "none";
        return;
    }

    circle.style.display = "block";

    const dir = Math.sign(power);
    const speed = Math.min(Math.pow(Math.abs(power) / 1000, 0.5) * 0.005, 0.05);

    f.pos += speed * dir;

    if (f.pos > 1) f.pos = 0;
    if (f.pos < 0) f.pos = 1;

    const pt = path.getPointAtLength(f.pos * path.getTotalLength());

    circle.setAttribute("cx", pt.x);
    circle.setAttribute("cy", pt.y);
}

// ================= LOOP =================
function animate() {

    animateFlow("net", energy.net);
    animateFlow("battery", energy.battery);
    animateFlow("solar", energy.solar);
    animateFlow("house", energy.house);
    animateFlow("ev", energy.ev);

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
